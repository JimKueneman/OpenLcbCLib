<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDI Editor — OpenLcbCLib</title>

    <!-- Syntax highlighting — same CDN/version as CDI editor -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>

    <style>

        /* ===== Reset & base ================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --color-primary:        #0056b3;
            --color-primary-dark:   #004494;
            --color-bg:             #f4f4f9;
            --color-surface:        #ffffff;
            --color-border:         #ddd;
            --color-text:           #333;
            --color-muted:          #666;
            --color-error-bg:       #fee2e2;
            --color-error-text:     #b91c1c;
            --color-warning-bg:     #fef3c7;
            --color-warning-text:   #92400e;
            --color-info-bg:        #e0f2fe;
            --color-info-text:      #075985;
            --color-toolbar-h:      40px;
            --splitter-size:        6px;
            --font-mono:            'Consolas', 'Menlo', 'Courier New', monospace;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Full-height flex shell */
        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ===== Top header ================================================== */
        .app-header {
            height: 44px;
            background: var(--color-primary);
            color: #fff;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 200;
        }

        .app-header h1 {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            margin-right: auto;
        }

        /* ===== Toolbar ===================================================== */
        .toolbar {
            height: var(--color-toolbar-h);
            background: #e9ecef;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
            flex-shrink: 0;
        }

        .toolbar button {
            padding: 0 12px;
            height: 28px;
            border: 1px solid #bbb;
            border-radius: 4px;
            background: #fff;
            color: var(--color-text);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
        }

        .toolbar button:hover:not(:disabled) { background: #dee2e6; }

        .toolbar button:disabled { opacity: 0.45; cursor: not-allowed; }

        .toolbar-sep { width: 1px; height: 22px; background: #bbb; margin: 0 4px; }

        .toolbar .file-btn-wrap {
            position: relative;
            display: inline-block;
        }

        .toolbar .file-btn-wrap input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
        }

        .toolbar .file-btn-wrap button { pointer-events: none; }

        .toolbar .loaded-filename {
            font-family: var(--font-mono);
            font-size: 11px;
            color: #4ec9b0;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 2px 6px;
            background: #1e1e1e;
            border: 1px solid #3c3c3c;
            border-radius: 3px;
        }

        .toolbar .loaded-filename:empty { display: none; }

        /* ===== Workspace — horizontal split ================================ */
        .workspace {
            display: flex;
            flex-direction: row;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ===== Editor pane (LH) ============================================ */
        .editor-pane {
            display: flex;
            flex-direction: column;
            flex: 0 0 55%;
            min-width: 200px;
            overflow: hidden;
            background: #1e1e1e;
        }

        .editor-inner {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* line-number gutter */
        .line-numbers {
            width: 42px;
            flex-shrink: 0;
            background: #252526;
            color: #858585;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.5;
            padding: 8px 0;
            text-align: right;
            padding-right: 8px;
            overflow: hidden;
            user-select: none;
            pointer-events: none;
            z-index: 1;
        }

        .line-numbers div { height: 19.5px; }

        .editor-text-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .hl-overlay {
            position: absolute;
            inset: 0;
            margin: 0;
            padding: 8px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.5;
            tab-size: 2;
            white-space: pre;
            overflow: hidden;
            pointer-events: none;
            border: none;
            border-radius: 0;
            background: #1e1e1e;
            z-index: 1;
            word-break: normal;
            overflow-wrap: normal;
        }

        .hl-overlay code.hljs {
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            background: transparent !important;
            padding: 0;
            white-space: inherit;
            display: block;
        }

        textarea#xml-editor {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            color: transparent;
            caret-color: #aeafad;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.5;
            padding: 8px;
            border: none;
            outline: none;
            resize: none;
            tab-size: 2;
            overflow-y: scroll;
            overflow-x: auto;
            white-space: pre;
            z-index: 2;
        }

        textarea#xml-editor::placeholder { color: #555; }

        .editor-statusbar {
            height: 22px;
            background: #007acc;
            color: #fff;
            font-size: 11px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 12px;
            flex-shrink: 0;
        }

        /* ===== Validation footer =========================================== */
        .validation-footer {
            height: 68px;
            min-height: 68px;
            max-height: 68px;
            background: #1a3a5c;
            border-top: 1px solid #2a5a8c;
            font-family: var(--font-mono);
            font-size: 10px;
            color: #c0c0c0;
            overflow-y: auto;
            flex-shrink: 0;
            line-height: 1.6;
        }

        .validation-footer .validation-list { list-style: none; }

        .validation-footer .validation-list li {
            display: flex;
            align-items: baseline;
            gap: 6px;
            padding: 2px 10px;
            border-bottom: 1px solid #1a4a6c;
            cursor: pointer;
        }

        .validation-footer .validation-list li:hover { background: #1a4a6c; }

        .validation-footer .val-ok {
            color: #4ade80;
            padding: 4px 10px;
        }

        .v-badge {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .v-error   { background: var(--color-error-bg);   color: var(--color-error-text);   }
        .v-warning { background: var(--color-warning-bg);  color: var(--color-warning-text); }
        .v-info    { background: var(--color-info-bg);     color: var(--color-info-text);    }

        .v-line { color: var(--color-muted); font-size: 10px; flex-shrink: 0; }

        /* ===== Workspace splitter ========================================== */
        .ws-splitter {
            flex-shrink: 0;
            width: var(--splitter-size);
            cursor: col-resize;
            background: #c8c8c8;
            transition: background 0.15s;
            z-index: 10;
        }

        .ws-splitter:hover,
        .ws-splitter.dragging { background: #0078d4; }

        /* ===== Function grid pane (RH) ===================================== */
        .fn-grid-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 200px;
            background: var(--color-bg);
            overflow: hidden;
        }

        .fn-grid-header {
            height: 32px;
            background: #e9ecef;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text);
            flex-shrink: 0;
        }

        .fn-grid-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .fn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 6px;
        }

        /* Individual function button */
        .fn-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 56px;
            padding: 6px 4px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            background: var(--color-surface);
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
            text-align: center;
            user-select: none;
        }

        .fn-btn:hover {
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.15);
        }

        .fn-btn.fn-defined {
            background: #e8f4fd;
            border-color: #90caf9;
        }

        .fn-btn.fn-defined:hover {
            background: #d0eafb;
            border-color: #0078d4;
        }

        .fn-btn .fn-number {
            font-size: 10px;
            font-weight: 700;
            color: var(--color-muted);
            margin-bottom: 2px;
        }

        .fn-btn .fn-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text);
            line-height: 1.2;
            word-break: break-word;
            max-width: 100%;
        }

        .fn-btn .fn-kind-badge {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1px 4px;
            border-radius: 3px;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .fn-kind-binary {
            background: #dbeafe;
            color: #1e40af;
        }

        .fn-kind-momentary {
            background: #fef3c7;
            color: #92400e;
        }

        .fn-btn.fn-empty .fn-name {
            color: #bbb;
            font-weight: 400;
            font-style: italic;
        }

        /* ===== Function edit popover ======================================= */
        .fn-popover-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            z-index: 500;
        }

        .fn-popover-overlay.visible { display: flex; align-items: center; justify-content: center; }

        .fn-popover {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            padding: 16px 20px;
            width: 280px;
            max-width: 90vw;
        }

        .fn-popover h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--color-text);
        }

        .fn-popover label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--color-muted);
            margin-bottom: 4px;
            margin-top: 10px;
        }

        .fn-popover label:first-of-type { margin-top: 0; }

        .fn-popover input[type="text"],
        .fn-popover select {
            width: 100%;
            height: 30px;
            padding: 0 8px;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            font-size: 13px;
            background: #fff;
            color: var(--color-text);
        }

        .fn-popover input[type="text"]:focus,
        .fn-popover select:focus {
            outline: none;
            border-color: #0078d4;
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.2);
        }

        .fn-popover-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .fn-popover-actions button {
            flex: 1;
            height: 30px;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.12s;
        }

        .fn-popover-actions .btn-save {
            background: #0078d4;
            color: #fff;
            border-color: #0078d4;
        }

        .fn-popover-actions .btn-save:hover { background: #005fa3; }

        .fn-popover-actions .btn-cancel {
            background: #fff;
            color: var(--color-text);
        }

        .fn-popover-actions .btn-cancel:hover { background: #f0f0f0; }

        .fn-popover-actions .btn-remove {
            background: #fff;
            color: var(--color-error-text);
            border-color: var(--color-error-text);
            flex: 0 0 auto;
            padding: 0 10px;
        }

        .fn-popover-actions .btn-remove:hover { background: var(--color-error-bg); }

    </style>
</head>
<body>

<div class="app-shell">

    <header class="app-header">
        <h1>FDI Editor</h1>
    </header>

    <!-- ===== Toolbar ====================================================== -->
    <div class="toolbar">

        <!-- Open file -->
        <div class="file-btn-wrap">
            <button>&#x1F4C2; Open XML</button>
            <input type="file" id="file-input" accept=".xml" title="Open FDI XML file">
        </div>

        <span class="loaded-filename" id="loaded-filename" title="Loaded XML file"></span>

        <div class="toolbar-sep"></div>

        <button id="btn-basic-xml">&#x2726; Basic XML</button>

        <div class="toolbar-sep"></div>

        <button id="btn-validate" disabled>&#x2713; Validate</button>
        <button id="btn-clear">&#x2715; Clear</button>

    </div>

    <!-- ===== Workspace ==================================================== -->
    <div class="workspace" id="workspace">

        <!-- Editor pane (LH) -->
        <div class="editor-pane" id="editor-pane">

            <div class="editor-inner" id="editor-inner">
                <div class="line-numbers" id="line-numbers"></div>
                <div class="editor-text-wrap">
                    <pre class="hl-overlay" id="hl-overlay" aria-hidden="true"><code id="hl-code" class="language-xml"></code></pre>
                    <textarea id="xml-editor"
                              spellcheck="false"
                              autocomplete="off"
                              autocorrect="off"
                              autocapitalize="off"
                              placeholder="Paste or open an FDI XML file to begin..."></textarea>
                </div>
            </div>

            <div class="editor-statusbar" id="editor-statusbar">
                <span id="status-bytes">0 bytes (UTF-8)</span>
                <span id="status-chars">0 chars</span>
                <span id="status-lines">0 lines</span>
                <span id="status-cursor">Ln 1, Col 1</span>
            </div>

            <!-- Validation footer -->
            <div class="validation-footer" id="validation-footer">
                <div class="val-ok" id="validation-ok">No issues detected</div>
                <ul class="validation-list" id="validation-list"></ul>
            </div>

        </div>

        <!-- Splitter -->
        <div class="ws-splitter" id="ws-splitter"></div>

        <!-- Function grid pane (RH) -->
        <div class="fn-grid-pane" id="fn-grid-pane">
            <div class="fn-grid-header">Function Map (F0 – F28)</div>
            <div class="fn-grid-scroll" id="fn-grid-scroll">
                <div class="fn-grid" id="fn-grid"></div>
            </div>
        </div>

    </div>

</div><!-- /.app-shell -->

<!-- ===== Edit popover (modal) ============================================= -->
<div class="fn-popover-overlay" id="fn-popover-overlay">
    <div class="fn-popover" id="fn-popover">
        <h3 id="pop-title">Edit Function</h3>

        <label for="pop-name">Name</label>
        <input type="text" id="pop-name" placeholder="e.g. Headlight" maxlength="64" autocomplete="off">

        <label for="pop-kind">Kind</label>
        <select id="pop-kind">
            <option value="binary">Binary (toggle on/off)</option>
            <option value="momentary">Momentary (press-and-hold)</option>
        </select>

        <div class="fn-popover-actions">
            <button class="btn-remove" id="pop-remove" title="Remove this function from the FDI">&#x2715;</button>
            <button class="btn-cancel" id="pop-cancel">Cancel</button>
            <button class="btn-save" id="pop-save">Save</button>
        </div>
    </div>
</div>

<script src="js/fdi_validator.js"></script>
<script src="js/fdi_function_grid.js"></script>
<script>

/* =========================================================================
 * fdi_editor.html — application shell script
 * ========================================================================= */

'use strict';

/* ---------- Element refs -------------------------------------------------- */
var elEditor      = document.getElementById('xml-editor');
var elHlCode      = document.getElementById('hl-code');
var elHlOverlay   = document.getElementById('hl-overlay');
var elLineNums    = document.getElementById('line-numbers');
var elValList     = document.getElementById('validation-list');
var elValOk       = document.getElementById('validation-ok');
var elStatusBytes = document.getElementById('status-bytes');
var elStatusChars = document.getElementById('status-chars');
var elStatusLines = document.getElementById('status-lines');
var elStatusCur   = document.getElementById('status-cursor');
var btnValidate   = document.getElementById('btn-validate');
var btnClear      = document.getElementById('btn-clear');
var fileInput     = document.getElementById('file-input');
var elWorkspace   = document.getElementById('workspace');
var elEditorPane  = document.getElementById('editor-pane');
var elSplitter    = document.getElementById('ws-splitter');

/* ---------- Embedded mode detection --------------------------------------- */
var _isEmbedded = window.parent !== window;
var _postTimer  = null;

function _postXmlToParent() {

    if (!_isEmbedded) { return; }

    clearTimeout(_postTimer);
    _postTimer = setTimeout(function () {

        window.parent.postMessage({
            type:     'xmlChanged',
            xml:      elEditor.value,
            filename: _loadedFilename || null
        }, '*');

    }, 300);

}

/* ---------- State --------------------------------------------------------- */
var currentXml      = '';
var _loadedFilename = '';
var _suppressGridSync = false;   /* prevent XML→grid→XML loop */

var elFilename = document.getElementById('loaded-filename');

function _setFilename(name) {

    _loadedFilename = name || '';
    elFilename.textContent = _loadedFilename;
    elFilename.title       = _loadedFilename ? 'Loaded: ' + _loadedFilename : '';

}

/* ---------- File open ----------------------------------------------------- */
fileInput.addEventListener('change', function (e) {

    var file = e.target.files[0];
    if (!file) { return; }

    _setFilename(file.name);

    var reader = new FileReader();
    reader.onload = function (ev) {

        elEditor.value = ev.target.result;
        onEditorChange();

    };
    reader.readAsText(file);
    fileInput.value = '';

});

/* ---------- Editor events ------------------------------------------------- */
elEditor.addEventListener('input',  onEditorChange);
elEditor.addEventListener('keydown', onEditorKeydown);
elEditor.addEventListener('scroll', syncScroll);
elEditor.addEventListener('click',  updateCursor);
elEditor.addEventListener('keyup',  updateCursor);

var _validateTimer = null;
var _gridSyncTimer = null;

function onEditorChange() {

    currentXml = elEditor.value;
    _updateLineNumbers();
    _updateStatusBar();
    _updateHighlight();

    var hasContent = currentXml.trim().length > 0;
    btnValidate.disabled = !hasContent;

    /* Auto-validate after a short debounce */
    clearTimeout(_validateTimer);
    if (hasContent) {
        _validateTimer = setTimeout(validate, 500);
    }

    /* Sync XML → function grid (debounced, skip if grid triggered this) */
    if (!_suppressGridSync) {

        clearTimeout(_gridSyncTimer);
        _gridSyncTimer = setTimeout(function () {

            FdiFunctionGrid.syncFromXml(currentXml);

        }, 300);

    }

    /* Notify parent of content change (embedded mode) */
    if (_isEmbedded) { _postXmlToParent(); }

}

/* ---------- Syntax highlighting ------------------------------------------ */

function _updateHighlight() {

    elHlCode.textContent = elEditor.value;
    delete elHlCode.dataset.highlighted;
    hljs.highlightElement(elHlCode);
    _syncHighlightScroll();

}

function _syncHighlightScroll() {

    elHlOverlay.scrollTop  = elEditor.scrollTop;
    elHlOverlay.scrollLeft = elEditor.scrollLeft;

}

/* Tab key inserts two spaces instead of losing focus */
function onEditorKeydown(e) {

    if (e.key !== 'Tab') { return; }
    e.preventDefault();

    var start = elEditor.selectionStart;
    var end   = elEditor.selectionEnd;

    elEditor.value = elEditor.value.substring(0, start) + '  ' + elEditor.value.substring(end);
    elEditor.selectionStart = elEditor.selectionEnd = start + 2;
    onEditorChange();

}

function updateCursor() {

    var pos  = elEditor.selectionStart;
    var text = elEditor.value.substring(0, pos);
    var line = (text.match(/\n/g) || []).length + 1;
    var col  = pos - text.lastIndexOf('\n');

    elStatusCur.textContent = 'Ln ' + line + ', Col ' + col;

}

function _updateStatusBar() {

    var chars = elEditor.value.length;
    var lines = elEditor.value === '' ? 0 : (elEditor.value.match(/\n/g) || []).length + 1;
    var bytes = typeof TextEncoder !== 'undefined'
        ? new TextEncoder().encode(elEditor.value).length
        : chars;

    elStatusBytes.textContent = bytes.toLocaleString() + ' bytes (UTF-8)';
    elStatusChars.textContent = chars.toLocaleString() + ' chars';
    elStatusLines.textContent = lines.toLocaleString() + ' lines';

}

/* ---------- Line numbers -------------------------------------------------- */
function _updateLineNumbers() {

    var lines = elEditor.value === '' ? 1 : (elEditor.value.match(/\n/g) || []).length + 1;
    var frag  = document.createDocumentFragment();

    for (var i = 1; i <= lines; i++) {

        var d = document.createElement('div');
        d.textContent = i;
        frag.appendChild(d);

    }

    elLineNums.innerHTML = '';
    elLineNums.appendChild(frag);

}

function syncScroll() {

    elLineNums.scrollTop = elEditor.scrollTop;
    _syncHighlightScroll();

}

/* ---------- Validate ------------------------------------------------------ */
btnValidate.addEventListener('click', validate);

function validate() {

    var xml = elEditor.value.trim();

    if (!xml) {

        elValList.innerHTML = '';
        elValOk.textContent = 'No issues detected';
        elValOk.style.display = '';

        if (_isEmbedded) {
            window.parent.postMessage({ type: 'validationStatus', view: 'fdi', errors: 0, warnings: 0 }, '*');
        }
        return;

    }

    var issues = FdiValidator.validate(xml);

    elValList.innerHTML = '';

    if (issues.length === 0) {

        elValOk.textContent = 'No issues detected';
        elValOk.style.display = '';

    } else {

        elValOk.style.display = 'none';
        issues.forEach(function (issue) {
            elValList.appendChild(_buildIssueItem(issue));
        });

    }

    /* Report validation status to parent shell for badge display */
    if (_isEmbedded) {

        var errorCount   = issues.filter(function (i) { return i.severity === 'error'; }).length;
        var warningCount = issues.filter(function (i) { return i.severity === 'warning'; }).length;

        window.parent.postMessage({
            type:     'validationStatus',
            view:     'fdi',
            errors:   errorCount,
            warnings: warningCount
        }, '*');

    }

}

function _buildIssueItem(issue) {

    var li = document.createElement('li');

    var badge = document.createElement('span');
    badge.className   = 'v-badge v-' + issue.severity;
    badge.textContent = issue.severity;
    li.appendChild(badge);

    if (issue.line) {

        var ln = document.createElement('span');
        ln.className   = 'v-line';
        ln.textContent = 'Ln ' + issue.line + (issue.col ? ':' + issue.col : '');
        li.appendChild(ln);

        li.addEventListener('click', function () { _jumpToLine(issue.line); });

    }

    var msg = document.createElement('span');
    msg.textContent = issue.message;
    li.appendChild(msg);

    return li;

}

function _jumpToLine(lineNum) {

    var lines = elEditor.value.split('\n');
    var pos   = 0;

    for (var i = 0; i < lineNum - 1 && i < lines.length; i++) {
        pos += lines[i].length + 1;
    }

    elEditor.focus();
    elEditor.selectionStart = pos;
    elEditor.selectionEnd   = pos;
    updateCursor();

}

/* ---------- Splitter drag ------------------------------------------------- */

var _dragging = false;

elSplitter.addEventListener('mousedown', function (e) {

    e.preventDefault();
    _dragging = true;
    elSplitter.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

});

window.addEventListener('mousemove', function (e) {

    if (!_dragging) { return; }

    var rect = elWorkspace.getBoundingClientRect();
    var x    = e.clientX - rect.left;
    var min  = 200;
    var max  = rect.width - 200;

    x = Math.max(min, Math.min(max, x));

    elEditorPane.style.flexBasis = x + 'px';
    elEditorPane.style.flexGrow  = '0';

});

window.addEventListener('mouseup', function () {

    if (!_dragging) { return; }
    _dragging = false;
    elSplitter.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';

});

/* ---------- Function grid → XML callback --------------------------------- */

/**
 * Called by FdiFunctionGrid when the user edits a function visually.
 * Receives the full array of 29 slot objects and rebuilds the XML.
 */
function onFunctionGridChanged(slots) {

    _suppressGridSync = true;

    elEditor.value = FdiFunctionGrid.buildXmlFromSlots(slots);
    _setFilename('');
    onEditorChange();

    /* Re-enable grid sync after the change has propagated */
    setTimeout(function () { _suppressGridSync = false; }, 50);

}

/* ---------- Init ---------------------------------------------------------- */

FdiFunctionGrid.init(
    document.getElementById('fn-grid'),
    document.getElementById('fn-popover-overlay'),
    onFunctionGridChanged
);

_updateLineNumbers();
_updateStatusBar();

/* ---------- Embedded mode (iframe inside Node Wizard) --------------------- */

if (_isEmbedded) {

    var appHeader = document.querySelector('.app-header');
    if (appHeader) { appHeader.style.display = 'none'; }

    window.addEventListener('message', function (e) {

        if (!e.data) { return; }

        if (e.data.type === 'loadXml') {

            if (e.data.xml && e.data.xml.trim().length > 0) {

                elEditor.value = e.data.xml;
                if (e.data.filename) { _setFilename(e.data.filename); }
                onEditorChange();

            }

        }

    });

    window.parent.postMessage({ type: 'ready', view: 'fdi' }, '*');

    if (elEditor.value.trim().length > 0) {
        _postXmlToParent();
    }

}
