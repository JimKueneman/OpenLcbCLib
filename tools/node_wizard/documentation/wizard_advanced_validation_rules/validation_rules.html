<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Wizard — Advanced UI Validation Rules</title>
    <link rel="stylesheet" href="validation_rules.css">
</head>
<body>

    <header>
        <h1>Node Wizard — Advanced UI Validation Rules</h1>
        <p class="subtitle">
            Constraints checked when the user clicks <strong>Validate</strong> in Advanced UI.
            Each row is a single rule: <em>if [field] [op] [value]</em>, then <em>[field] must [op] [value]</em>.
        </p>
        <div class="toolbar">
            <button id="btn-load" onclick="document.getElementById('file-input').click()">Load JSON</button>
            <button id="btn-export" onclick="exportJSON()">Export JSON</button>
            <button id="btn-collapse" onclick="toggleAll()">Collapse All</button>
            <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadJSON(this)">
            <span class="change-count" id="change-count"></span>
        </div>
    </header>

    <main id="rules-root"></main>

    <script src="validation_rules_data.js"></script>
    <script src="validation_rules.js"></script>

</body>
</html>
