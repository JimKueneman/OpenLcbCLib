<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Wizard — Configuration Matrix (Editable)</title>
    <link rel="stylesheet" href="matrix.css">
</head>
<body>

    <header>
        <h1>Node Wizard — Configuration Matrix</h1>
        <p class="subtitle">Editable reference for all <code>node_parameters_t</code> and <code>openlcb_user_config.h</code> fields.</p>
        <div class="toolbar">
            <button id="btn-load" onclick="document.getElementById('file-input').click()">Load JSON</button>
            <button id="btn-export" onclick="exportJSON()">Export JSON</button>
            <button id="btn-collapse" onclick="toggleAll()">Collapse All</button>
            <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadJSON(this)">
            <span class="change-count" id="change-count"></span>
        </div>
    </header>

    <main id="matrix-root"></main>

    <script src="matrix_data.js"></script>
    <script src="matrix.js"></script>

</body>
</html>
