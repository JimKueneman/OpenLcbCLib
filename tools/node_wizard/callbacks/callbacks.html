<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callback Editor — OpenLcbCLib</title>
    <link rel="stylesheet" href="callbacks.css">

    <!-- CodeMirror 6 (read-only C preview) -->
    <script src="../vendor/codemirror/dist/codemirror.min.js"></script>
    <script src="../vendor/codemirror/cm-readonly.js"></script>
</head>
<body>

    <div class="layout">

        <!-- ===== LEFT: Callback list ===== -->
        <main class="fn-panel" id="fn-panel">
            <h2 id="group-title">Callback Functions</h2>
            <p class="group-desc" id="group-desc">Select the callbacks to generate stubs for</p>
            <div id="fn-list"></div>
        </main>

        <!-- ===== SPLITTER ===== -->
        <div class="splitter" id="splitter"></div>

        <!-- ===== RIGHT: Live code preview ===== -->
        <aside class="preview-panel">

            <div class="preview-header">
                <div class="preview-tabs">
                    <button class="tab-btn active" id="tab-h" onclick="switchTab('h')">callback.h</button>
                    <button class="tab-btn"        id="tab-c" onclick="switchTab('c')">callback.c</button>
                </div>
                <span class="preview-filename" id="preview-filename"></span>
            </div>

            <div class="code-preview" id="code-preview"></div>

        </aside>

    </div>

    <script src="js/callback_defs.js"></script>
    <script src="js/callback_codegen.js"></script>

    <script>

    let _currentGroup = null;
    let _currentTab   = 'h';
    let _currentNodeType = null;

    function switchTab(tab) {

        _currentTab = tab;
        document.getElementById('tab-h').classList.toggle('active', tab === 'h');
        document.getElementById('tab-c').classList.toggle('active', tab === 'c');
        _renderPreview();

    }

    /* ---------- Build a single checkbox item ---------- */

    function _createFnItem(group, fn) {

        const item = document.createElement('label');
        item.className = 'fn-item';

        const cb = document.createElement('input');
        cb.type    = 'checkbox';
        cb.dataset.fnName = fn.name;

        if (fn.required) {
            cb.checked  = true;
            cb.disabled = true;
        }

        cb.addEventListener('change', function () {

            _renderPreview();
            _postStateToParent();

        });

        const content = document.createElement('div');
        content.className = 'fn-item-content';

        const nameEl = document.createElement('span');
        nameEl.className   = 'fn-name';
        nameEl.textContent = group.functionPrefix + '_' + fn.name + '()';

        const descEl = document.createElement('span');
        descEl.className   = 'fn-desc';
        descEl.textContent = fn.description;

        content.appendChild(nameEl);
        content.appendChild(descEl);

        if (fn.detail) {

            const moreLink = document.createElement('a');
            moreLink.className   = 'fn-detail-toggle';
            moreLink.textContent = 'more';
            moreLink.href        = '#';

            const detailEl = document.createElement('span');
            detailEl.className   = 'fn-detail';
            detailEl.textContent = fn.detail;
            detailEl.style.display = 'none';

            moreLink.addEventListener('click', function (ev) {

                ev.preventDefault();
                ev.stopPropagation();
                var showing = detailEl.style.display !== 'none';
                detailEl.style.display = showing ? 'none' : 'block';
                moreLink.textContent   = showing ? 'more' : 'less';

            });

            content.appendChild(moreLink);
            content.appendChild(detailEl);

        }

        const tagEl = document.createElement('span');
        tagEl.className   = fn.required ? 'fn-required' : 'fn-optional';
        tagEl.textContent = fn.required ? 'REQUIRED' : 'Optional';

        content.appendChild(tagEl);

        item.appendChild(cb);
        item.appendChild(content);

        return item;

    }

    /* ---------- Build checkbox list for a group ---------- */

    function _createSectionDetails(title) {

        var details = document.createElement('details');
        details.className = 'section-collapsible';

        var summary = document.createElement('summary');
        summary.className   = 'section-toggle';
        summary.textContent = title;
        details.appendChild(summary);

        var list = document.createElement('div');
        list.className = 'section-list';
        details.appendChild(list);

        return { details: details, list: list };

    }

    function _filterFunctionsForRole(functions) {

        /* Only filter when viewing cb-train with a known node type */
        if (_currentGroup !== 'cb-train' || !_currentNodeType) { return functions; }

        var trainSections = ['Train Node — Notifications', 'Train Node — Decisions', 'Train Search'];
        var controllerSections = ['Throttle — Replies', 'Train Search'];

        var allowed;
        if (_currentNodeType === 'train') {
            allowed = trainSections;
        } else if (_currentNodeType === 'train-controller') {
            allowed = controllerSections;
        } else {
            return functions;
        }

        return functions.filter(function (fn) {

            if (!fn.section) { return true; }
            return allowed.indexOf(fn.section) >= 0;

        });

    }

    function _renderFunctionList(group) {

        document.getElementById('group-title').textContent = group.title;
        document.getElementById('group-desc').textContent  = group.description;

        const container = document.getElementById('fn-list');
        container.innerHTML = '';

        /* Filter functions by train role when applicable */
        var visibleFunctions = _filterFunctionsForRole(group.functions);

        /* Check if any function uses sections or advanced */
        var hasSections = visibleFunctions.some(function (fn) { return !!fn.section; });
        var hasAdvanced = visibleFunctions.some(function (fn) { return !!fn.advanced; });

        if (hasSections) {

            /* Section-based layout: each section is a collapsible <details> */
            var lastSection = null;
            var currentList = null;

            visibleFunctions.forEach(function (fn) {

                if (fn.section !== lastSection) {
                    var sec = _createSectionDetails(fn.section);
                    container.appendChild(sec.details);
                    currentList = sec.list;
                    lastSection = fn.section;
                }

                currentList.appendChild(_createFnItem(group, fn));

            });

        } else {

            /* Flat layout with optional Advanced collapsible */
            visibleFunctions.forEach(function (fn) {

                if (fn.advanced) { return; }
                container.appendChild(_createFnItem(group, fn));

            });

            if (hasAdvanced) {

                var details = document.createElement('details');
                details.className = 'advanced-section';

                var summary = document.createElement('summary');
                summary.className   = 'advanced-toggle';
                summary.textContent = 'Advanced';
                details.appendChild(summary);

                var advContainer = document.createElement('div');
                advContainer.className = 'advanced-list';

                visibleFunctions.forEach(function (fn) {

                    if (!fn.advanced) { return; }
                    advContainer.appendChild(_createFnItem(group, fn));

                });

                details.appendChild(advContainer);
                container.appendChild(details);

            }

        }

    }

    function _getCheckedFunctions() {

        if (!_currentGroup) { return []; }

        const group = CALLBACK_GROUPS[_currentGroup];
        const checked = [];

        document.querySelectorAll('#fn-list input[type="checkbox"]').forEach(function (cb) {

            if (cb.checked) {

                const fn = group.functions.find(function (f) { return f.name === cb.dataset.fnName; });
                if (fn) { checked.push(fn); }

            }

        });

        return checked;

    }

    /* ---------- CodeMirror read-only viewer ---------- */

    let _cmViewer = null;

    function _ensureCMViewer() {

        if (_cmViewer) { return _cmViewer; }
        _cmViewer = createCMReadonly(document.getElementById('code-preview'));
        return _cmViewer;

    }

    function _renderPreview() {

        const viewer  = _ensureCMViewer();
        const fnameEl = document.getElementById('preview-filename');

        if (!_currentGroup) {

            viewer.value = '// Select a callback group to preview';
            return;

        }

        const group   = CALLBACK_GROUPS[_currentGroup];
        const checked = _getCheckedFunctions();

        document.getElementById('tab-h').textContent = group.filePrefix + '.h';
        document.getElementById('tab-c').textContent = group.filePrefix + '.c';

        if (_currentTab === 'h') {

            fnameEl.textContent = group.filePrefix + '.h';
            viewer.value = CallbackCodegen.generateH(group, checked);

        } else {

            fnameEl.textContent = group.filePrefix + '.c';
            viewer.value = CallbackCodegen.generateC(group, checked);

        }

    }

    function _postStateToParent() {

        if (!_currentGroup) { return; }

        const checked = [];
        document.querySelectorAll('#fn-list input[type="checkbox"]').forEach(function (cb) {

            if (cb.checked) { checked.push(cb.dataset.fnName); }

        });

        window.parent.postMessage({
            type:  'callbackStateChanged',
            group: _currentGroup,
            state: { checked: checked }
        }, '*');

    }

    function _restoreState(state) {

        if (!state || !state.checked) { return; }

        document.querySelectorAll('#fn-list input[type="checkbox"]').forEach(function (cb) {

            if (!cb.disabled) {
                cb.checked = state.checked.indexOf(cb.dataset.fnName) >= 0;
            }

        });

        _renderPreview();

    }

    window.addEventListener('message', function (e) {

        if (!e.data || !e.data.type) { return; }

        switch (e.data.type) {

            case 'setGroup':

                _currentGroup    = e.data.group;
                _currentNodeType = e.data.nodeType || null;

                if (CALLBACK_GROUPS[_currentGroup]) {
                    _renderFunctionList(CALLBACK_GROUPS[_currentGroup]);
                    _renderPreview();
                }
                break;

            case 'restoreState':

                _restoreState(e.data.state);
                break;

        }

    });

    window.parent.postMessage({ type: 'ready' }, '*');

    </script>

</body>
</html>
